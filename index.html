<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atelier Totoro — Stefan Iliescu Arhitect</title>
  <meta name="description" content="Stefan Iliescu – arhitect cu experiență în proiecte rezidențiale, culturale și de renovare.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Nav trigger — fixed bottom-centre, opens the contents panel -->
  <button class="nav-toggle" id="nav-toggle" aria-label="Navigare" aria-expanded="false">
    <span></span>
    <span></span>
  </button>

  <!-- Dim overlay behind the panel -->
  <div class="nav-overlay" id="nav-overlay"></div>

  <!-- Slide-in contents panel -->
  <nav class="nav-panel" id="nav-panel" aria-hidden="true">
    <ul class="nav-list" id="nav-list"></ul>
    <a href="#contact" class="nav-contact-link">Contact</a>
  </nav>

  <main>

    <section id="hero">
      <div class="hero-portrait-wrap">
        <div class="hero-portrait" id="hero-portrait">
          <img src="heroPortrait.jpeg" alt="Stefan Iliescu — Arhitect">
          <span class="hero-initials" aria-hidden="true">SI</span>
        </div>
      </div>
      <div class="hero-content" id="hero-content">
        <h1 class="hero-name">Atelier<br>Tototro</h1>
        <div class="hero-rule"></div>
        <p class="hero-subtitle">Stefan Iliescu<br> Arhitect</p>
        <p class="hero-bio">Spatii si Forme Fluide</p>
      </div>
      <div class="scroll-indicator" id="scroll-indicator" aria-hidden="true">
        <span class="scroll-indicator-text">Scroll</span>
        <div class="scroll-dot"></div>
      </div>
    </section>

    <!-- Projects are injected here by js/main.js from js/projects.js -->
    <div id="projects-container"></div>

    <section id="contact">
      <div class="contact-rule reveal"></div>
      <h2 class="contact-heading reveal reveal-d1">Contact</h2>
      <address class="contact-details" style="font-style: normal;">
        <a href="mailto:atelier.totoro@gmail.com" class="contact-line reveal reveal-d1">atelier.totoro@gmail.com</a>
        <a href="tel:+40724288711" class="contact-line reveal reveal-d2">+40 724 288 711</a>
        <a href="https://www.instagram.com/atelier.totoro?igsh=ejFrOHNwZGtnZXlx&utm_source=qr" target="_blank" rel="noopener" class="contact-line reveal reveal-d3">@atelier.totoro</a>
        <span class="contact-line reveal reveal-d4">București, România</span>
      </address>
      <footer class="contact-footer reveal">
        <p>© <span id="year"></span> Stefan Iliescu — Arhitect. Toate drepturile rezervate.</p>
      </footer>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.3.1/dist/lenis.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/main.js"></script>
  <script>document.getElementById('year').textContent = new Date().getFullYear();</script>

</body>
</html>
